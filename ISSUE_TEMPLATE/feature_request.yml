name: Feature request
description: Propose a new bundled command, agent, skill, MCP, or framework capability
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for thinking out loud. A few framing rules before you submit:

        - **Custom/ first.** Most "I want X" requests belong in your own fork's `custom/` subfolder (see [CONTRIBUTING.md](../blob/main/.github/CONTRIBUTING.md)). Only propose bundled additions when the capability would benefit *every* operator.
        - **Real use case beats clever idea.** Describe the workflow that needs this, not just the abstract feature.

  - type: dropdown
    id: layer
    attributes:
      label: Which layer would this land in?
      options:
        - "agents/ (new task agent)"
        - "skills/ (new reusable capability)"
        - "commands/ (new /aios:* command)"
        - "hooks/ (new pipeline script)"
        - "mcps/ (new bundled MCP)"
        - "templates/ (new template)"
        - "Cross-layer / architectural"
        - "Docs / framework convention"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The real workflow friction this addresses. Not the feature — the problem.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What's the proposal?
      description: How would this work from the operator's perspective? What does the command, agent, or skill do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Could this live in `custom/` instead? Could an existing command be extended? Could a skill cover it?

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: This belongs in the bundle, not just my own custom/ folder
          required: true
        - label: I've searched existing issues and this isn't a duplicate
          required: true
